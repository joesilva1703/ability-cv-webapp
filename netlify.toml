# Netlify configuration for the Ability CV Formatter frontend.
# Deploy this repo to Netlify; point the base directory at "frontend".

[build]
  base      = "frontend"
  command   = "npm run build"
  publish   = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app routing — send every unknown path to index.html.
[[redirects]]
  from   = "/*"
  to    = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(), microphone=(), geolocation=()"
